<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="format-detection" content="telephone=no" />
    
    <title>Pangan Emas Abadi</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1czO2SWxIMEqVMKrwJnetuR_sOVV74bDt" />
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1czO2SWxIMEqVMKrwJnetuR_sOVV74bDt" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet" />

    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        z-index: 999999;
        overflow: hidden;
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: splash-in 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      #splash-screen.fade-out .splash-content {
        animation: splash-out 0.8s cubic-bezier(0.4, 0, 1, 1) forwards;
      }

      .splash-logo {
        width: 260px;
        height: auto;
        opacity: 0;
        filter: drop-shadow(0 10px 25px rgba(0,0,0,0.08));
      }

      @keyframes splash-in {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.9);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes splash-out {
        to {
          opacity: 0;
          transform: translateY(-20px) scale(1.05);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-content">
        <img src="https://lh3.googleusercontent.com/d/1U_Zz244W4Rw-I8OQNDskVSeGHm9DPDoU" alt="Pangan Emas Abadi" class="splash-logo" style="opacity: 1;" />
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function () {
        const MIN_DURATION = 5000;
        const startTime = Date.now();

        const hideSplash = () => {
          const splash = document.getElementById('splash-screen');
          if (splash && !splash.classList.contains('fade-out')) {
            const currentTime = Date.now();
            const elapsed = currentTime - startTime;
            const remaining = Math.max(0, MIN_DURATION - elapsed);

            setTimeout(() => {
              splash.classList.add('fade-out');
              setTimeout(() => {
                splash.remove();
              }, 1000); 
            }, remaining);
          }
        };

        window.addEventListener('load', hideSplash);
        setTimeout(hideSplash, 6000); // Fallback
      })();
    </script>
  </body>
</html>
