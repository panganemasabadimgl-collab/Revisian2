<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pangan Mas Abadi - Splash Screen</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0537ab;
        z-index: 999999;
        overflow: hidden;
        transition:
          opacity 0.6s ease-in-out,
          visibility 0.6s;
      }

      #splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        transition-delay: 1.4s; /* Match disk total duration (1.2s + 0.2s delay) */
      }

      .splash-disk {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 300vmax;
        height: 300vmax;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(1);
        z-index: 1;
        transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
      }

      .splash-disk.white {
        background-color: #ffffff;
        z-index: 3;
      }

      .splash-disk.mid-blue {
        background-color: #1a56e0; /* Lighter Blue */
        z-index: 2;
        transition-delay: 0.1s;
      }

      .splash-disk.dark-blue {
        background-color: #042a82; /* Darker Blue */
        z-index: 1;
        transition-delay: 0.2s;
      }

      #splash-screen.fade-out .splash-disk {
        transform: translate(-50%, -50%) scale(0);
      }

      .splash-content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition:
          transform 1.1s cubic-bezier(0.85, 0, 0.15, 1),
          opacity 0.9s cubic-bezier(0.85, 0, 0.15, 1);
      }

      #splash-screen.fade-out .splash-content {
        transform: scale(0);
        opacity: 0;
      }

      .splash-logo {
        width: 180px;
        height: auto;
        opacity: 0;
        transform: scale(0.85);
        animation: splash-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      }

      @keyframes splash-in {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
</head>
<body>
    <div id="splash-screen">
      <div class="splash-disk dark-blue"></div>
      <div class="splash-disk mid-blue"></div>
      <div class="splash-disk white"></div>
      <div class="splash-content">
        <!-- Logo URL should be absolute or relative to where this file is used -->
        <img src="/maindi-logo.png" alt="Maindi Logo" class="splash-logo" />
      </div>
    </div>

    <script>
      (function () {
        const MIN_DURATION = 1000;
        const startTime = Date.now();

        const hideSplash = () => {
          const splash = document.getElementById('splash-screen');
          if (splash && !splash.classList.contains('fade-out')) {
            const currentTime = Date.now();
            const elapsed = currentTime - startTime;
            const remaining = Math.max(0, MIN_DURATION - elapsed);

            setTimeout(() => {
              splash.classList.add('fade-out');
              setTimeout(() => {
                splash.remove();
              }, 2000); 
            }, remaining);
          }
        };

        window.addEventListener('load', hideSplash);
        setTimeout(hideSplash, 3000);
      })();
    </script>
</body>
</html>
